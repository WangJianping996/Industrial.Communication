name: build-test-pack

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with history for Source Link
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Select package version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            value="${GITHUB_REF_NAME#v}"
          else
            value="0.1.0-preview.${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Communication.sln

      - name: Release build
        run: >-
          dotnet build Communication.sln -c Release --no-restore
          /p:Version=${{ steps.version.outputs.value }}

      - name: Automated tests
        run: dotnet test Communication.sln -c Release --no-build

      - name: Public API compatibility baseline
        run: dotnet run --project tools/ApiSurface/ApiSurface.csproj -c Release --no-build -- --verify

      - name: Pack preview or tag version
        run: >-
          dotnet pack Communication.sln -c Release --no-build
          -o artifacts/packages
          /p:Version=${{ steps.version.outputs.value }}
          /p:RepositoryUrl=https://github.com/${{ github.repository }}

      - name: Audit package contents and metadata
        shell: pwsh
        run: >-
          ./eng/verify-packages.ps1
          -PackageDirectory artifacts/packages
          -ExpectedVersion '${{ steps.version.outputs.value }}'
          -ExpectedRepositoryUrl 'https://github.com/${{ github.repository }}'

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ steps.version.outputs.value }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish tagged release to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          test -n "$NUGET_API_KEY"
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done
